<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
     <!--added class for the first element in div-->
    <p class="one">Number 1 - I'm a class!</p>
    <!--added id for the second element in div-->
    <div id="two">Number 2 - I'm one ID.</div>
     <!--added class for the second element in div-->
    <p class="three">Number 3 - I'm a class, but cooler!</p>
     <!--added id for the fourth element in div-->
    <div id="four">Number 4 - I'm another ID.</div>
     <!--added class for the fifth element in div-->
    <p class="five">Number 5 - I'm a class!</p>
  </body>
</html>
