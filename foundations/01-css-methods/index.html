<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods for Adding CSS</title>
    <!-- added void element for external CSS style method for <div> and <button> -->
    <link rel="stylesheet" href="styles.css">
    <!--added internal CSS style method within the head tag for <p> make sure to
      add the tag type <p> before the curly brackets, because you are styling <p> only. -->
      <style>
        p {
          color: white;
          background-color: green;
          font-size: 18px;
        }
      </style>
  </head>
  <body>
    <div>Style me via the external method!</div>
    <p>I would like to be styled with the internal method, please.</p>
     <!-- added the inline CSS style method in the <button. To do this you added the style after the 
      button tag so it now says <button style="...."-->
    <button style="background-color: orange; font-size: 18px;">Inline Method</button>
  </body>
</html>
